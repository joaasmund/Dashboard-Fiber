<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Salgsdashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0e1a;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.04em}
.top-right{display:flex;align-items:center;gap:14px}
.clock{font-size:13px;color:rgba(255,255,255,.4);font-weight:500}
.month-badge{background:rgba(99,102,241,.18);color:#a5b4fc;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;border:1px solid rgba(99,102,241,.3)}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
.sync-dot.err{background:#ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.add-btn{background:rgba(99,102,241,.18);color:#a5b4fc;border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

.main{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;padding:16px 28px 0}
.stat-card{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px 20px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-blue::before{background:linear-gradient(90deg,#6366f1,#818cf8)}
.sc-green::before{background:linear-gradient(90deg,#10b981,#34d399)}
.sc-amber::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.sc-purple::before{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.stat-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase}
.stat-value{font-size:26px;font-weight:800;line-height:1.1}
.stat-sub{font-size:11px;color:rgba(255,255,255,.35)}
.stat-icon{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.sc-blue .stat-icon{background:rgba(99,102,241,.15);color:#818cf8}
.sc-green .stat-icon{background:rgba(16,185,129,.15);color:#34d399}
.sc-amber .stat-icon{background:rgba(245,158,11,.15);color:#fbbf24}
.sc-purple .stat-icon{background:rgba(139,92,246,.15);color:#a78bfa}

.content{display:grid;grid-template-columns:1fr 340px;gap:12px;padding:12px 28px 20px}
.left-col{display:flex;flex-direction:column;gap:12px}
.panel{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 22px}
.panel-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px}
.lb-header{display:grid;grid-template-columns:40px 1fr 90px 110px 130px 90px;gap:8px;padding:0 8px 8px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px}
.lb-hcell{font-size:10px;font-weight:600;color:rgba(255,255,255,.25);letter-spacing:.08em;text-transform:uppercase}
.lb-hcell:nth-child(3),.lb-hcell:nth-child(4),.lb-hcell:nth-child(5),.lb-hcell:nth-child(6){text-align:right}
.lb-row{display:grid;grid-template-columns:40px 1fr 90px 110px 130px 90px;gap:8px;align-items:center;padding:7px 8px;border-radius:10px}
.lb-row.top1{background:rgba(250,204,21,.04);border:1px solid rgba(250,204,21,.12)}
.lb-row.top2{background:rgba(156,163,175,.04);border:1px solid rgba(156,163,175,.1)}
.lb-row.top3{background:rgba(180,83,9,.04);border:1px solid rgba(180,83,9,.12)}
.rank{font-size:14px;font-weight:700;text-align:center}
.r1{color:#fbbf24}.r2{color:#9ca3af}.r3{color:#b45309}.rn{color:rgba(255,255,255,.25);font-size:13px}
.seller-info{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sname{font-size:13px;font-weight:600;color:#f1f5f9}
.cell-num{font-size:13px;font-weight:700;text-align:right;color:#f1f5f9}
.prog-wrap{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.prog-bg{width:70px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-pct{font-size:11px;font-weight:600;min-width:32px;text-align:right}
.badge-sm{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-align:center}
.b-green{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)}
.b-yellow{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.b-red{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}

.right-col{display:flex;flex-direction:column;gap:12px}
.best-card{background:linear-gradient(135deg,#1e1b4b 0%,#111827 100%);border:1px solid rgba(99,102,241,.2);border-radius:14px;padding:20px;text-align:center}
.best-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 12px;border:2px solid rgba(250,204,21,.4)}
.best-name{font-size:16px;font-weight:700;margin-bottom:4px}
.best-sub{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:12px}
.best-stat{font-size:28px;font-weight:800;color:#fbbf24;line-height:1}
.best-lbl{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.activity-panel{background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 20px;flex:1}
.act-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;background:#6366f1;margin-top:5px;flex-shrink:0}
.act-dot.g{background:#10b981}
.act-name{font-size:12px;font-weight:600;color:#f1f5f9}
.act-det{font-size:11px;color:rgba(255,255,255,.35);margin-top:1px}
.act-val{font-size:12px;font-weight:700;color:#a5b4fc;margin-left:auto;white-space:nowrap}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:#1a2236;border:1px solid rgba(99,102,241,.3);border-radius:14px;padding:22px;width:520px}
.modal h3{font-size:14px;font-weight:700;margin-bottom:4px;color:#a5b4fc}
.modal p{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:14px}
.modal textarea{width:100%;min-height:110px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:monospace;font-size:12px;padding:10px;resize:vertical;margin-bottom:12px}
.modal textarea::placeholder{color:rgba(255,255,255,.2)}
.mbtns{display:flex;gap:8px;align-items:center}
.mbtn{border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid}
.mb-add{background:rgba(99,102,241,.2);color:#a5b4fc;border-color:rgba(99,102,241,.4)}
.mb-cancel{background:transparent;color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.1)}
.mb-reset{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.25);margin-left:auto}
.status-msg{font-size:11px;margin-top:10px;color:rgba(255,255,255,.4);min-height:16px}
.chip{font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo"><i class="ti ti-chart-bar"></i> Salgsdashboard</div>
  <span class="month-badge" id="month-badge">Laster...</span>
  <div class="top-right">
    <div class="sync-wrap"><span class="sync-dot" id="sync-dot"></span><span id="sync-lbl">Kobler til...</span></div>
    <div class="clock" id="clock"></div>
    <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> Legg til data</button>
  </div>
</div>

<div class="main" id="stat-cards"></div>
<div class="content">
  <div class="left-col">
    <div class="panel">
      <div class="panel-title" id="lb-title">Leaderboard</div>
      <div class="lb-header">
        <div class="lb-hcell">Plass</div><div class="lb-hcell">Selger</div>
        <div class="lb-hcell">FIBER-salg</div><div class="lb-hcell">Omsetning</div>
        <div class="lb-hcell">Fremgang</div><div class="lb-hcell">Status</div>
      </div>
      <div id="leaderboard"></div>
    </div>
  </div>
  <div class="right-col">
    <div class="best-card" id="best-card"></div>
    <div class="activity-panel">
      <div class="panel-title">Siste registreringer</div>
      <div id="activity"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <h3><i class="ti ti-table-import"></i> Legg til salgsdata</h3>
    <p>Lim inn tab-separert data fra Excel. Alle TV-er oppdateres automatisk.</p>
    <textarea id="paste-area" placeholder="Consultant	Date of sale	Week	Value	Product&#10;Kalle	16.06.2026	24	9000	FIBER 100"></textarea>
    <div class="mbtns">
      <button class="mbtn mb-add" onclick="addData()"><i class="ti ti-upload"></i> Last opp</button>
      <button class="mbtn mb-cancel" onclick="closeModal()">Avbryt</button>
      <span class="chip" id="row-count">—</span>
      <button class="mbtn mb-reset" onclick="resetData()"><i class="ti ti-trash"></i> Nullstill</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://pwsoebozobzgmojojtdx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB3c29lYm96b2J6Z21vam9qdGR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MDY0OTUsImV4cCI6MjA5NzE4MjQ5NX0.0ww8_az1_3Qf83GK15WvExSaQvjmjCXncEkCr5ZZCLA';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const ACTIVE=['kalle','alijan','marcus','hurlen','andreas','hermelink','simen','lars','melvin','eliot','torjus','sander','omar','aleksandra','aleksander','aleksander rognstad','nizar','shifa','jonas','chris','bjørn','charlie','arion'];
const DN={'kalle':'Kalle','alijan':'Alijan','marcus':'Marcus','hurlen':'Hurlen','andreas':'Andreas','hermelink':'Hermelink','simen':'Simen','lars':'Lars','melvin':'Melvin','eliot':'Eliot','torjus':'Torjus','sander':'Sander','omar':'Omar','aleksandra':'Aleksandra','aleksander':'Aleksander','aleksander rognstad':'Aleksander R.','nizar':'Nizar','shifa':'Shifa','jonas':'Jonas','chris':'Chris','bjørn':'Bjørn','charlie':'Charlie','arion':'Arion'};
const AC=[['#6366f1','#1e1b4b'],['#10b981','#052e16'],['#f59e0b','#2d1d00'],['#8b5cf6','#2e1065'],['#ec4899','#500724'],['#14b8a6','#042f2e'],['#3b82f6','#1e3a5f'],['#ef4444','#450a0a'],['#a855f7','#3b0764'],['#22c55e','#052e16'],['#06b6d4','#082f49'],['#f97316','#431407'],['#84cc16','#1a2e05'],['#e879f9','#4a044e']];
const SMAL=8, OMAL=80000;

let allRows=[];

function gac(n){let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AC.length;return AC[h];}
function gdn(n){return DN[n.toLowerCase()]||n;}
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function kr(n){return new Intl.NumberFormat('nb-NO',{maximumFractionDigits:0}).format(n)+' kr';}
function isF(p){return p.toUpperCase().includes('FIBER');}
function isA(n){return ACTIVE.includes(n.toLowerCase());}
function pd(ds){const p=ds.split('.');return p.length===3?new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])):new Date(0);}
function gmk(ds){const p=ds.split('.');return p.length===3?p[1]+'.'+p[2]:'';}
function gml(key){const mn=['','Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];const[mm,yy]=key.split('.');return(mn[parseInt(mm)]||mm)+' '+yy;}

function setSync(ok){
  document.getElementById('sync-dot').className='sync-dot'+(ok?'':' err');
  document.getElementById('sync-lbl').textContent=ok?'Live':'Frakoblet';
}

function parseTSV(txt){
  const lines=txt.trim().split('\n').filter(l=>l.trim());
  const rows=[];
  let s=lines[0]&&lines[0].toLowerCase().includes('consultant')?1:0;
  for(let i=s;i<lines.length;i++){
    const c=lines[i].split('\t');
    if(c.length<5) continue;
    const consultant=c[0].trim(),date_of_sale=c[1].trim(),week=c[2].trim();
    const value=parseFloat(c[3].replace(/[^0-9.,]/g,'').replace(',','.'))||0;
    const product=c[4].trim();
    if(!consultant) continue;
    rows.push({consultant,date_of_sale,week,value,product});
  }
  return rows;
}

async function loadData(){
  const {data,error}=await sb.from('sales').select('*');
  if(error){setSync(false);return;}
  setSync(true);
  allRows=(data||[]).map(r=>({name:r.consultant,dateStr:r.date_of_sale,value:r.value,product:r.product}));
  document.getElementById('row-count').textContent=allRows.length+' rader i DB';
  render();
}

// Sanntidsoppdatering
sb.channel('sales-changes')
  .on('postgres_changes',{event:'*',schema:'public',table:'sales'},()=>loadData())
  .subscribe(s=>setSync(s==='SUBSCRIBED'));

window.openModal=()=>document.getElementById('modal').classList.add('open');
window.closeModal=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))window.closeModal();});

window.addData=async()=>{
  const txt=document.getElementById('paste-area').value;
  const rows=parseTSV(txt);
  if(!rows.length){alert('Ingen gyldige rader. Sjekk at data er tab-separert.');return;}
  const msg=document.getElementById('status-msg');
  msg.textContent='Laster opp '+rows.length+' rader...';
  const {error}=await sb.from('sales').insert(rows);
  if(error){msg.textContent='Feil: '+error.message;console.error(error);return;}
  document.getElementById('paste-area').value='';
  msg.textContent='✓ '+rows.length+' rader lastet opp! Alle skjermer oppdateres nå.';
  setTimeout(()=>{msg.textContent='';window.closeModal();},2500);
};

window.resetData=async()=>{
  if(!confirm('Dette sletter ALLE data fra databasen. Er du sikker?')) return;
  const msg=document.getElementById('status-msg');
  msg.textContent='Sletter...';
  const {error}=await sb.from('sales').delete().neq('id','00000000-0000-0000-0000-000000000000');
  if(error){msg.textContent='Feil: '+error.message;return;}
  msg.textContent='✓ Alle data slettet.';
  setTimeout(()=>{msg.textContent='';},2000);
};

function render(){
  const months=[...new Set(allRows.map(r=>gmk(r.dateStr)).filter(Boolean))].sort();
  const lm=months[months.length-1]||'06.2026';
  const ml=gml(lm);
  document.getElementById('month-badge').textContent=ml;
  document.getElementById('lb-title').textContent='Leaderboard — '+ml;

  const aRows=allRows.filter(r=>isA(r.name));
  const mRows=aRows.filter(r=>gmk(r.dateStr)===lm);

  const sd=ACTIVE.map(sk=>{
    const rows=mRows.filter(r=>r.name.toLowerCase()===sk);
    return{key:sk,name:gdn(sk),salg:rows.filter(r=>isF(r.product)).length,omset:rows.reduce((a,r)=>a+r.value,0)};
  });
  const wd=sd.filter(s=>s.salg>0||s.omset>0).sort((a,b)=>b.salg-a.salg||b.omset-a.omset);
  const nd=sd.filter(s=>s.salg===0&&s.omset===0);
  const sorted=[...wd,...nd];

  const tO=sorted.reduce((a,s)=>a+s.omset,0);
  const tS=sorted.reduce((a,s)=>a+s.salg,0);
  const snitt=sorted.length?Math.round(tO/sorted.length):0;
  const foran=sorted.filter(s=>s.salg>=SMAL||s.omset>=OMAL).length;

  document.getElementById('stat-cards').innerHTML=`
    <div class="stat-card sc-blue"><div class="stat-icon"><i class="ti ti-currency-dollar"></i></div><div class="stat-label">Total omsetning</div><div class="stat-value">${kr(tO)}</div><div class="stat-sub">${ml}</div></div>
    <div class="stat-card sc-green"><div class="stat-icon"><i class="ti ti-chart-bar"></i></div><div class="stat-label">FIBER-salg</div><div class="stat-value">${tS}</div><div class="stat-sub">Antall totalt</div></div>
    <div class="stat-card sc-amber"><div class="stat-icon"><i class="ti ti-users"></i></div><div class="stat-label">Snitt per selger</div><div class="stat-value">${kr(snitt)}</div><div class="stat-sub">Omsetning</div></div>
    <div class="stat-card sc-purple"><div class="stat-icon"><i class="ti ti-target"></i></div><div class="stat-label">På mål (8 salg)</div><div class="stat-value">${foran}<span style="font-size:16px;color:rgba(255,255,255,.3)"> / ${sorted.length}</span></div><div class="stat-sub">Selgere foran</div></div>`;

  document.getElementById('leaderboard').innerHTML=sorted.map((s,i)=>{
    const pct=Math.min(Math.round(s.salg/SMAL*100),100);
    const [bg,fg]=gac(s.name);
    const rc=i===0?'top1':i===1?'top2':i===2?'top3':'';
    const rk=i===0?`<span class="rank r1"><i class="ti ti-crown"></i></span>`:i===1?`<span class="rank r2">2</span>`:i===2?`<span class="rank r3">3</span>`:`<span class="rank rn">${i+1}</span>`;
    const bc=pct>=100?'b-green':pct>=50?'b-yellow':'b-red';
    const bt=pct>=100?'På mål':pct>=50?'På vei':'Under mål';
    const clr=pct>=100?'#10b981':pct>=50?'#f59e0b':'#ef4444';
    return`<div class="lb-row ${rc}">${rk}<div class="seller-info"><div class="av" style="background:${fg};color:${bg}">${ini(s.name)}</div><span class="sname">${s.name}</span></div><div class="cell-num">${s.salg}</div><div class="cell-num">${kr(s.omset)}</div><div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:${clr}"></div></div><span class="prog-pct" style="color:${clr}">${pct}%</span></div><div style="text-align:right"><span class="badge-sm ${bc}">${bt}</span></div></div>`;
  }).join('');

  const best=wd[0];
  if(best){
    const [bg,fg]=gac(best.name);
    document.getElementById('best-card').innerHTML=`<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px"><i class="ti ti-star"></i> Leder denne måneden</div><div class="best-av" style="background:${fg};color:${bg}">${ini(best.name)}</div><div class="best-name">${best.name}</div><div class="best-sub">${best.salg} FIBER-salg i ${ml}</div><div class="best-stat">${kr(best.omset)}</div><div class="best-lbl">Total omsetning</div>`;
  }

  const recent=[...aRows].sort((a,b)=>pd(b.dateStr)-pd(a.dateStr)).slice(0,8);
  document.getElementById('activity').innerHTML=recent.map(r=>`<div class="act-item"><div class="act-dot ${isF(r.product)?'g':''}"></div><div style="flex:1;min-width:0"><div class="act-name">${gdn(r.name)}</div><div class="act-det">${r.product} — ${r.dateStr}</div></div><div class="act-val">${kr(r.value)}</div></div>`).join('');
}

function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long'})+' — '+now.toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'});
}

loadData();
tick();
setInterval(tick,30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Salgsdashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070b14;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

.shell{padding:16px 26px;max-width:1680px;margin:0 auto}

.titles{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.eyebrow{font-size:11px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px}
.h1{font-size:34px;font-weight:900;letter-spacing:-.01em}
.h1 .accent{background:linear-gradient(90deg,#34d399,#22c55e);-webkit-background-clip:text;background-clip:text;color:transparent}
.live-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:6px 14px;border-radius:20px}
.live-pill .ld{width:7px;height:7px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
.live-pill .ld.err{background:#ef4444;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.actions{display:flex;gap:8px}
.btn{border-radius:9px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid}
.btn-pink{background:rgba(236,72,153,.15);color:#f472b6;border-color:rgba(236,72,153,.3)}
.btn-blue{background:rgba(99,102,241,.18);color:#a5b4fc;border-color:rgba(99,102,241,.3)}
.top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* STAT STRIP */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.stat-box{background:#0d1320;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-box.b1::before{background:linear-gradient(90deg,#34d399,#22c55e)}
.stat-box.b2::before{background:linear-gradient(90deg,#a78bfa,#8b5cf6)}
.stat-box.b3::before{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.stat-box.b4::before{background:linear-gradient(90deg,#60a5fa,#3b82f6)}
.stat-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.b1 .stat-ico{background:rgba(52,211,153,.15);color:#34d399}
.b2 .stat-ico{background:rgba(167,139,250,.15);color:#a78bfa}
.b3 .stat-ico{background:rgba(251,191,36,.15);color:#fbbf24}
.b4 .stat-ico{background:rgba(96,165,250,.15);color:#60a5fa}
.stat-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
.stat-val{font-size:21px;font-weight:800;line-height:1.15}

/* MAIN GRID */
.main-grid{display:grid;grid-template-columns:1fr 300px;gap:14px}
.card{background:#0d1320;border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:20px}

/* PODIUM (compact) */
.podium-row{display:grid;grid-template-columns:1fr 1.12fr 1fr;gap:14px;align-items:end;margin-bottom:18px}
.pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
.pod-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;position:relative}
.pod-1 .pod-av{width:68px;height:68px;font-size:24px;border:3px solid #fbbf24;box-shadow:0 0 22px rgba(250,204,21,.3)}
.pod-2 .pod-av,.pod-3 .pod-av{width:50px;height:50px;font-size:17px}
.crown{position:absolute;top:-19px;left:50%;transform:translateX(-50%);font-size:17px}
.pod-name{font-size:14px;font-weight:700}
.pod-1 .pod-name{font-size:16px}
.pod-sub{font-size:10px;color:rgba(255,255,255,.35)}
.pod-bar{width:100%;border-radius:12px 12px 0 0;padding:12px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.pod-rank{font-size:11px;font-weight:800;color:rgba(255,255,255,.3)}
.pod-1 .pod-bar{background:linear-gradient(180deg,rgba(250,204,21,.16),rgba(250,204,21,.04));border:1px solid rgba(250,204,21,.25);height:76px;justify-content:center}
.pod-1 .pod-rank{font-size:16px;color:#fbbf24}
.pod-2 .pod-bar{background:linear-gradient(180deg,rgba(167,139,250,.14),rgba(167,139,250,.03));border:1px solid rgba(167,139,250,.2);height:58px;justify-content:center}
.pod-2 .pod-rank{color:#a78bfa}
.pod-3 .pod-bar{background:linear-gradient(180deg,rgba(52,211,153,.14),rgba(52,211,153,.03));border:1px solid rgba(52,211,153,.2);height:48px;justify-content:center}
.pod-3 .pod-rank{color:#34d399}
.pod-val{font-size:16px;font-weight:800}
.pod-1 .pod-val{font-size:19px}

/* CHASE LIST — 2 column grid, all visible */
.chase-title{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin:2px 0 10px}
.chase-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.chase-row{display:grid;grid-template-columns:20px 24px 1fr 70px 50px;gap:8px;align-items:center;padding:6px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.chase-row:hover{background:rgba(255,255,255,.03)}
.chase-rank{font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-align:center}
.chase-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.chase-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chase-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
.chase-bar-fill{height:100%;border-radius:3px}
.chase-val{font-size:10px;color:rgba(255,255,255,.32);text-align:right;white-space:nowrap}

/* LIVE FEED */
.feed-title{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.feed-dot{width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
.feed-list{display:flex;flex-direction:column;gap:2px;max-height:620px;overflow-y:auto}
.feed-list::-webkit-scrollbar{width:4px}
.feed-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.feed-item{display:flex;align-items:center;gap:9px;padding:8px 6px;border-radius:9px;cursor:pointer}
.feed-item:hover{background:rgba(255,255,255,.03)}
.feed-av{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.feed-info{flex:1;min-width:0}
.feed-name{font-size:11px;font-weight:700}
.feed-prod{font-size:9px;color:rgba(255,255,255,.3)}
.feed-val{font-size:11px;font-weight:800;color:#34d399;white-space:nowrap}

/* MODALS */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#0d1320;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:22px;width:440px}
.modal h3{font-size:14px;font-weight:700;margin-bottom:4px;color:#a5b4fc}
.modal p{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:14px}
.modal textarea{width:100%;min-height:110px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;font-family:monospace;font-size:12px;padding:10px;resize:vertical;margin-bottom:12px}
.modal textarea::placeholder{color:rgba(255,255,255,.2)}
.mbtns{display:flex;gap:8px;align-items:center}
.mbtn{border-radius:8px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:1px solid}
.mb-blue{background:rgba(99,102,241,.2);color:#a5b4fc;border-color:rgba(99,102,241,.4)}
.mb-cancel{background:transparent;color:rgba(255,255,255,.35);border-color:rgba(255,255,255,.1)}
.mb-red{background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.25)}
.mb-amber{background:rgba(245,158,11,.1);color:#fbbf24;border-color:rgba(245,158,11,.25)}
.mb-pink{background:rgba(236,72,153,.15);color:#f472b6;border-color:rgba(236,72,153,.35)}
.smsg{font-size:11px;margin-top:10px;color:rgba(255,255,255,.4);min-height:16px}
.chip{font-size:11px;color:rgba(255,255,255,.3);background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px}
.ef{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.el{font-size:11px;font-weight:600;color:rgba(255,255,255,.4)}
.eh{font-size:10px;color:rgba(255,255,255,.2);margin-top:2px}
.ei{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:18px;font-weight:700;padding:10px 12px;font-family:'Inter',sans-serif;width:100%;text-align:center}
.ei:focus{outline:none;border-color:rgba(99,102,241,.5)}
.ei.ov2{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.af{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.al{font-size:11px;font-weight:600;color:rgba(255,255,255,.4)}
.ai{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:13px;font-weight:600;padding:9px 12px;font-family:'Inter',sans-serif;width:100%}

/* ANNOUNCEMENT */
.ann-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.ann-ov.show{display:flex}
.ann-box{background:linear-gradient(135deg,#1e1b4b,#0d1320);border:2px solid rgba(250,204,21,.35);border-radius:20px;padding:44px 52px;text-align:center;position:relative;max-width:520px;width:90%;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.ann-x{position:absolute;top:14px;right:16px;background:none;border:none;color:rgba(255,255,255,.4);font-size:22px;cursor:pointer}
.ann-x:hover{color:#fff}
.ann-emoji{font-size:44px;margin-bottom:14px}
.ann-title{font-size:26px;font-weight:900;color:#fbbf24;letter-spacing:.03em;line-height:1.25;margin-bottom:10px}
.ann-body{font-size:15px;color:rgba(255,255,255,.55);line-height:1.5}
</style>
</head>
<body>
<div class="shell">

  <div class="titles">
    <div>
      <div class="eyebrow">Salgsavdelingen · <span id="month-lbl">Juni 2026</span></div>
      <div class="h1">MÅNEDENS <span class="accent">ARENA</span></div>
    </div>
    <div class="top-right">
      <div class="live-pill"><span class="ld" id="sync-dot"></span><span id="sync-lbl">Kobler til...</span> <span id="clock" style="margin-left:6px"></span></div>
      <div class="actions">
        <button class="btn btn-pink" onclick="openAnnAdmin()"><i class="ti ti-speakerphone"></i> Kunngjøring</button>
        <button class="btn btn-blue" onclick="openM('add-modal')"><i class="ti ti-plus"></i> Legg til data</button>
      </div>
    </div>
  </div>

  <div class="stat-strip">
    <div class="stat-box b1"><div class="stat-ico"><i class="ti ti-currency-dollar"></i></div><div><div class="stat-lbl">Total omsetning</div><div class="stat-val" id="stat-omset"></div></div></div>
    <div class="stat-box b2"><div class="stat-ico"><i class="ti ti-chart-bar"></i></div><div><div class="stat-lbl">Fiber-salg totalt</div><div class="stat-val" id="stat-salg"></div></div></div>
    <div class="stat-box b3"><div class="stat-ico"><i class="ti ti-users"></i></div><div><div class="stat-lbl">Snitt per selger</div><div class="stat-val" id="stat-snitt"></div></div></div>
    <div class="stat-box b4"><div class="stat-ico"><i class="ti ti-target"></i></div><div><div class="stat-lbl">På mål (8 salg)</div><div class="stat-val" id="stat-paamaal"></div></div></div>
  </div>

  <div class="main-grid">
    <div class="left-col">
      <div class="card">
        <div class="podium-row" id="podium"></div>
        <div class="chase-title">Jakter på pallen</div>
        <div class="chase-grid" id="chase-list"></div>
      </div>
    </div>

    <div class="right-col">
      <div class="card">
        <div class="feed-title"><span class="feed-dot"></span> Live · siste salg</div>
        <div class="feed-list" id="feed-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
const testSellers = [
  {name:"Kalle", salg:25, omset:266500},
  {name:"Alijan", salg:23, omset:209750},
  {name:"Marcus", salg:15, omset:93200},
  {name:"Chris", salg:14, omset:81350},
  {name:"Andreas", salg:13, omset:70000},
  {name:"Jonas", salg:11, omset:64750},
  {name:"Omar", salg:10, omset:66000},
  {name:"Sander", salg:10, omset:65500},
  {name:"Arion", salg:9, omset:59000},
  {name:"Nizar", salg:8, omset:42750},
  {name:"Lars", salg:6, omset:38000},
  {name:"Melvin", salg:5, omset:31000},
  {name:"Aleksandra", salg:5, omset:27500},
  {name:"Charlie", salg:4, omset:22000},
  {name:"Eliot", salg:3, omset:18500},
  {name:"Torjus", salg:2, omset:11000},
  {name:"Aleksander R.", salg:2, omset:9500},
  {name:"Hurlen", salg:1, omset:5500},
  {name:"Hermelink", salg:1, omset:5000},
  {name:"Simen", salg:0, omset:0},
  {name:"Shifa", salg:0, omset:0},
  {name:"Bjørn", salg:0, omset:0},
  {name:"Aleksander", salg:0, omset:0},
];

const AC=[['#6366f1','#1e1b4b'],['#10b981','#052e16'],['#f59e0b','#2d1d00'],['#8b5cf6','#2e1065'],['#ec4899','#500724'],['#14b8a6','#042f2e'],['#3b82f6','#1e3a5f'],['#ef4444','#450a0a'],['#a855f7','#3b0764'],['#22c55e','#052e16'],['#06b6d4','#082f49'],['#f97316','#431407'],['#84cc16','#1a2e05'],['#e879f9','#4a044e']];
const SMAL=8,OMAL=80000;
const gac=n=>{let h=0;for(let i=0;i<n.length;i++)h=(h*31+n.charCodeAt(i))%AC.length;return AC[h];};
const ini=n=>n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const kr=n=>new Intl.NumberFormat('nb-NO',{maximumFractionDigits:0}).format(n)+' kr';

document.getElementById('sync-dot').className='ld';
document.getElementById('sync-lbl').textContent='Live (TESTDATA)';

const sorted = testSellers;
const wd = sorted.filter(s=>s.salg>0);
const tO=sorted.reduce((a,s)=>a+s.omset,0);
const tS=sorted.reduce((a,s)=>a+s.salg,0);
const snitt=sorted.length?Math.round(tO/sorted.length):0;
const foran=sorted.filter(s=>s.salg>=SMAL||s.omset>=OMAL).length;

document.getElementById('stat-omset').textContent=kr(tO);
document.getElementById('stat-salg').textContent=tS;
document.getElementById('stat-snitt').textContent=kr(snitt);
document.getElementById('stat-paamaal').innerHTML=foran+'<span style="font-size:14px;color:rgba(255,255,255,.3)"> / '+sorted.length+'</span>';

const top3=wd.slice(0,3);
const order=[1,0,2];
document.getElementById('podium').innerHTML=order.map(idx=>{
  const s=top3[idx];
  if(!s) return '<div class="pod-col"></div>';
  const place=idx+1;
  const [bg,fg]=gac(s.name);
  const crown=place===1?'<div class="crown"><i class="ti ti-crown"></i></div>':'';
  return `<div class="pod-col pod-${place}">
    <div class="pod-av" style="background:${fg};color:${bg}">${crown}${ini(s.name)}</div>
    <div class="pod-name">${s.name}</div>
    <div class="pod-sub">${s.salg} fiber-salg</div>
    <div class="pod-bar"><div class="pod-rank">${place}</div><div class="pod-val">${kr(s.omset)}</div></div>
  </div>`;
}).join('');

const chasers=sorted.slice(3);
const maxOmset=chasers.length?chasers[0].omset:1;
document.getElementById('chase-list').innerHTML=chasers.map((s,i)=>{
  const rank=i+4;
  const pct=maxOmset>0?Math.min(Math.round(s.omset/maxOmset*100),100):0;
  const [bg,fg]=gac(s.name);
  const clr=s.salg>=SMAL||s.omset>=OMAL?'#34d399':pct>=50?'#fbbf24':'#818cf8';
  return `<div class="chase-row">
    <span class="chase-rank">${rank}</span>
    <div class="chase-av" style="background:${fg};color:${bg}">${ini(s.name)}</div>
    <span class="chase-name">${s.name}</span>
    <div class="chase-bar-bg"><div class="chase-bar-fill" style="width:${pct}%;background:${clr}"></div></div>
    <span class="chase-val">${kr(s.omset)}</span>
  </div>`;
}).join('');

const feedData = [
  {name:"Kalle", product:"FIBER 200", value:12000},
  {name:"Kalle", product:"FIBER 100", value:9000},
  {name:"Alijan", product:"Fiber 60", value:7000},
  {name:"Alijan", product:"Fiber 100", value:9000},
  {name:"Marcus", product:"Fiber 100", value:9000},
  {name:"Chris", product:"Fiber 200", value:12000},
  {name:"Andreas", product:"Fiber 100", value:9000},
  {name:"Jonas", product:"Fiber 20", value:5000},
  {name:"Omar", product:"FIBER 100", value:9000},
  {name:"Sander", product:"fiber 60", value:7000},
];
document.getElementById('feed-list').innerHTML=feedData.map(r=>{
  const [bg,fg]=gac(r.name);
  return `<div class="feed-item"><div class="feed-av" style="background:${fg};color:${bg}">${ini(r.name)}</div><div class="feed-info"><div class="feed-name">${r.name}</div><div class="feed-prod">${r.product}</div></div><div class="feed-val">+${kr(r.value)}</div></div>`;
}).join('');

function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleDateString('nb-NO',{weekday:'short',day:'numeric',month:'short'})+' — '+now.toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit'});
}
tick();setInterval(tick,30000);
document.getElementById('month-lbl').textContent='Juni 2026 (TESTVISNING)';
</script>
</body>
</html>
